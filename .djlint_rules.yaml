- rule:
    name: X001
    message: Use ~ for string concatenation (Jinja compatibility)
    flags: re.DOTALL|re.I
    patterns:
      - '\+ ?"[^"]+"'
      - '\+ ?''[^'']+'''
      - '"[^"]+" ?\+'
      - '''[^'']+'' ?\+'

- rule:
    name: X002
    message: Use params.get("items", []) rather than params.items (Jinja compatibility)
    flags: re.DOTALL|re.I
    patterns:
      - params.items

- rule:
    name: X003
    message: Use params.get("values", []) rather than params.values (Jinja compatibility)
    flags: re.DOTALL|re.I
    patterns:
      - params.values

- rule:
    name: X004
    message: Use camelCase for variable names
    flags: re.DOTALL|re.I
    patterns:
      - '{%-? set \w+_\w+'

- rule:
    name: X005
    message: Quote keys in mappings (Jinja compatibility)
    flags: re.DOTALL|re.I
    patterns:
      - '^\s*[^"'']+: '

- rule:
    name: X006
    message: Avoid strict equality operators (Jinja compatibility)
    flags: re.DOTALL|re.I
    patterns:
      - '==='
      - '!=='

- rule:
    name: X007
    message: Use "| length" instead of ".length" (Jinja compatibility)
    flags: re.DOTALL|re.I
    patterns:
      - '\.length'

- rule:
    name: X008
    message: Use "in array" instead of "array.includes()" (Jinja compatibility)
    flags: re.DOTALL|re.I
    patterns:
      - '\.includes'
